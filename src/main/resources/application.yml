spring:
  application:
    name: corebanking-account-service
  datasource:
    url: jdbc:postgresql://localhost:5432/account_service
    username: account
    password: account
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
